<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Data - SILT BKPSDM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .swal2-image { object-fit: contain; max-height: 70vh !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">

    <nav class="bg-indigo-900 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="bg-white p-1.5 rounded-lg">
                        <i data-lucide="shield-check" class="text-indigo-900 w-6 h-6"></i>
                    </div>
                    <span class="text-lg font-bold tracking-tighter uppercase">SIP-Terpadu</span>
                </div>

                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-[10px] text-indigo-300 font-bold uppercase" id="role-label">Role</p>
                        <p class="text-sm font-semibold" id="user-display-name">Username</p>
                    </div>
                    <a href="admin.html" class="p-2 hover:bg-indigo-800 rounded-full transition">
                        <i data-lucide="home" class="w-5 h-5"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 flex-grow">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                <i data-lucide="check-square" class="text-indigo-600"></i> Verifikasi Data Terpadu
            </h1>
            <p class="text-slate-500 text-sm italic">Otorisasi dokumen dan peminjaman aset BKPSDM.</p>
        </div>

        <div class="mb-10">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="mail" class="text-indigo-500 w-5 h-5"></i>
                <h2 class="text-lg font-bold text-slate-700">Menunggu Verifikasi Surat Masuk</h2>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-indigo-50/50 text-indigo-900 text-[10px] uppercase tracking-widest border-b">
                                <th class="px-6 py-4 font-bold">Info Agenda</th>
                                <th class="px-6 py-4 font-bold">Detail Surat</th>
                                <th class="px-6 py-4 font-bold">Dokumen</th>
                                <th class="px-6 py-4 font-bold text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="table-surat-body" class="text-sm text-slate-600 divide-y divide-slate-50"></tbody>
                    </table>
                </div>
                <div id="no-surat-msg" class="p-10 text-center hidden">
                    <p class="text-slate-400 italic text-xs">Tidak ada antrean verifikasi surat.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-6 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p class="text-sm text-slate-500 font-medium">&copy; 2026 <span class="text-indigo-900 font-bold">SIP-Terpadu</span></p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = (localStorage.getItem('userRole') || 'USER').toUpperCase();
            if (role === 'USER') {
                alert("Akses Ditolak!");
                window.location.href = "admin.html";
                return;
            }
            document.getElementById('role-label').innerText = role;
            document.getElementById('user-display-name').innerText = localStorage.getItem('userName') || 'Pengguna';
            renderVerifikasi();
            lucide.createIcons();
        });

        function viewDocument(fileName, fileData) {
            if (!fileData || fileData === '#' || fileData === '-' || fileData === 'undefined' || fileData === 'null') {
                Swal.fire('Info', 'Berkas tidak ditemukan atau belum diunggah.', 'info');
                return;
            }

            // DETEKSI UTAMA: Jika fileData merupakan tautan eksternal (Google Drive, URL, dll)
            if (fileData.startsWith('http://') || fileData.startsWith('https://') || fileData.includes('drive.google.com')) {
                Swal.fire({
                    title: 'Buka Dokumen Terkait',
                    text: 'Dokumen ini disimpan di penyimpanan cloud (Google Drive).',
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonText: 'Buka di Tab Baru',
                    cancelButtonText: 'Tutup',
                    confirmButtonColor: '#312e81',
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.open(fileData, '_blank');
                    }
                });
                return;
            }

            // Penanganan untuk file berbasis Base64 lokal (Asli tetap dipertahaman)
            let contentHtml = '';
            if (fileData.includes('data:image')) {
                contentHtml = `<img src="${fileData}" class="max-w-full h-auto rounded-lg shadow-md mx-auto" />`;
            } else if (fileData.includes('data:application/pdf')) {
                contentHtml = `<iframe src="${fileData}" class="w-full h-[60vh] rounded-lg border shadow-inner" frameborder="0"></iframe>`;
            } else {
                contentHtml = `
                    <div class="p-10 text-center bg-slate-50 rounded-xl border-2 border-dashed border-slate-200">
                        <i data-lucide="file-text" class="w-12 h-12 text-slate-300 mx-auto mb-3"></i>
                        <p class="text-slate-600 mb-4 font-medium">Pratinjau tidak didukung untuk format ini.</p>
                        <a href="${fileData}" download="Dokumen_${fileName}" class="inline-flex items-center px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition shadow-sm gap-2">
                            <i data-lucide="download" class="w-4 h-4"></i> Unduh Berkas
                        </a>
                    </div>`;
            }

            Swal.fire({
                title: 'Pratinjau Dokumen',
                html: `<div class="mt-4">${contentHtml}</div>`,
                width: '900px',
                showCloseButton: true,
                confirmButtonText: 'Tutup',
                confirmButtonColor: '#312e81',
                didRender: () => { if(typeof lucide !== 'undefined') lucide.createIcons(); }
            });
        }

        function renderVerifikasi() {
            const suratBody = document.getElementById('table-surat-body');
            const noSuratMsg = document.getElementById('no-surat-msg');
            
            if (suratBody) suratBody.innerHTML = '';

            // 1. Logika Surat Masuk
            const dataSurat = JSON.parse(localStorage.getItem('arsipSuratMasuk')) || [];
            const pendingSurat = dataSurat.filter(s => s.status === 'Pending');

            if (pendingSurat.length === 0) {
                if (noSuratMsg) noSuratMsg.classList.remove('hidden');
            } else {
                if (noSuratMsg) noSuratMsg.classList.add('hidden');
                pendingSurat.forEach(surat => {
                    const dataFile = surat.fileContent || surat.lampiran || '#';
                    suratBody.insertAdjacentHTML('beforeend', `
                        <tr class="hover:bg-slate-50 transition border-l-4 border-l-indigo-500">
                            <td class="px-6 py-4">
                                <div class="font-bold text-indigo-900">#${surat.noAgenda || '-'}</div>
                                <div class="text-[10px] text-slate-400 font-mono">${surat.noSurat || '-'}</div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="font-bold text-slate-800">${surat.asalSurat}</div>
                                <div class="text-xs text-slate-500">${surat.perihal}</div>
                            </td>
                            <td class="px-6 py-4">
                                <button onclick="viewDocument('${surat.noAgenda}', '${dataFile}')" class="text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 rounded-full border border-indigo-100 flex items-center gap-1 text-xs font-semibold">
                                    <i data-lucide="eye" class="w-3.5 h-3.5"></i> Lihat
                                </button>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <div class="flex justify-center gap-2">
                                    <button onclick="prosesVerifikasiSurat(${surat.id}, 'Selesai')" class="bg-emerald-500 text-white p-2 rounded-lg hover:bg-emerald-600 shadow-sm transition"><i data-lucide="check" class="w-4 h-4"></i></button>
                                    <button onclick="prosesVerifikasiSurat(${surat.id}, 'Tolak')" class="bg-red-500 text-white p-2 rounded-lg hover:bg-red-600 shadow-sm transition"><i data-lucide="x" class="w-4 h-4"></i></button>
                                </div>
                            </td>
                        </tr>
                    `);
                });
            }
            lucide.createIcons();
        }

        function prosesVerifikasiSurat(id, statusBaru) {
            let dataSurat = JSON.parse(localStorage.getItem('arsipSuratMasuk')) || [];
            if (statusBaru === 'Tolak') {
                Swal.fire({
                    title: 'Tolak Surat?',
                    text: "Data akan dihapus permanen.",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#ef4444',
                    confirmButtonText: 'Ya, Tolak',
                    cancelButtonText: 'Batal'
                }).then((result) => {
                    if (result.isConfirmed) {
                        dataSurat = dataSurat.filter(s => s.id !== id);
                        localStorage.setItem('arsipSuratMasuk', JSON.stringify(dataSurat));
                        renderVerifikasi();
                    }
                });
            } else {
                const index = dataSurat.findIndex(s => s.id === id);
                if (index !== -1) {
                    dataSurat[index].status = 'Proses';
                    dataSurat[index].lokasi = 'Bagian Umum';
                    dataSurat[index].verifikator = localStorage.getItem('userName') || 'Admin';
                    
                    localStorage.setItem('arsipSuratMasuk', JSON.stringify(dataSurat));
                    Swal.fire('Berhasil', 'Surat diverifikasi. Status: Proses, Lokasi: Bagian Umum.', 'success');
                    renderVerifikasi();
                }
            }
        }

        // FUNGSI BERIKUT TETAP DIPERTAHANKAN UNTUK MENJAGA LOGIKA Halaman LAIN
        function prosesVerifikasiAset(id, aksi) {
            let pendingAset = JSON.parse(localStorage.getItem('dataVerifikasi')) || [];
            let dataBooking = JSON.parse(localStorage.getItem('dataBooking')) || [];

            if (aksi === 'Tolak') {
                Swal.fire({
                    title: 'Tolak Pinjaman?',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#ef4444',
                    confirmButtonText: 'Ya, Tolak',
                    cancelButtonText: 'Batal'
                }).then((result) => {
                    if (result.isConfirmed) {
                        localStorage.setItem('dataVerifikasi', JSON.stringify(pendingAset.filter(a => a.id !== id)));
                        let idx = dataBooking.findIndex(b => b.id === id);
                        if(idx !== -1) dataBooking[idx].status = 'Ditolak';
                        localStorage.setItem('dataBooking', JSON.stringify(dataBooking));
                        renderVerifikasi();
                    }
                });
            } else {
                const item = pendingAset.find(a => a.id === id);
                if (item) {
                    let idx = dataBooking.findIndex(b => b.id === id);
                    if(idx !== -1) {
                        dataBooking[idx].status = 'Proses';
                        dataBooking[idx].lokasi = 'Bagian Umum';
                    }
                    localStorage.setItem('dataBooking', JSON.stringify(dataBooking));
                    localStorage.setItem('dataVerifikasi', JSON.stringify(pendingAset.filter(a => a.id !== id)));
                    Swal.fire('Disetujui', 'Aset dalam status Proses di Bagian Umum.', 'success');
                    renderVerifikasi();
                }
            }
        }
    </script>
</body>
</html>
