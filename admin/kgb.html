<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenaikan Gaji Berkala (KGB) - SILT-BKPSDM </title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .print-area { width: 100%; border: none; }
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">

    <nav class="bg-indigo-900 text-white shadow-md px-6 py-4 flex justify-between items-center no-print">
        <div class="flex items-center gap-3">
            <a href="admin.html" class="hover:bg-indigo-800 p-2 rounded-lg transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <h1 class="font-bold tracking-tight uppercase">Data Keluar KGB (Terverifikasi)</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right hidden sm:block">
                <p class="text-[10px] text-indigo-300 font-bold uppercase tracking-widest leading-none">Petugas</p>
                <p class="text-sm font-semibold" id="user-display">Administrator</p>
            </div>
            <div class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center border-2 border-indigo-400">
                <i data-lucide="user" class="w-5 h-5"></i>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 no-print">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Manajemen SK KGB</h1>
                <p class="text-slate-500 text-sm">Daftar pegawai yang berkas Kenaikan Gaji Berkala-nya telah disetujui dan siap diterbitkan SK.</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden print-area">
            <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center bg-slate-50/50 gap-4">
                <h2 class="font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="award" class="text-indigo-600 w-5 h-5"></i> Arsip Keluar KGB
                </h2>
                <div class="flex items-center gap-2 no-print">
                    <button onclick="exportExcel()" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-700 transition">
                        <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> EXCEL
                    </button>
                    <button onclick="window.print()" class="flex items-center gap-2 px-4 py-2 bg-slate-700 text-white text-xs font-bold rounded-lg hover:bg-slate-800 transition">
                        <i data-lucide="printer" class="w-4 h-4"></i> CETAK DAFTAR
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-slate-600 uppercase text-[10px] font-bold tracking-wider border-b">
                        <tr>
                            <th class="px-6 py-4">Pegawai</th>
                            <th class="px-6 py-4">NIP / Jabatan</th>
                            <th class="px-6 py-4">Gaji Pokok Baru</th>
                            <th class="px-6 py-4">TMT KGB</th>
                            <th class="px-6 py-4 text-center">Status SK</th>
                            <th class="px-6 py-4 text-center no-print">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelKgb" class="text-sm text-slate-700 divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            loadDataKgb();
            lucide.createIcons();
            
            const user = localStorage.getItem('userName');
            if (user) document.getElementById('user-display').innerText = user;
        });

        // --- LOAD DATA FROM VERIFIKASI ---
        function loadDataKgb() {
            const tabel = document.getElementById('tabelKgb');
            
            // Mengambil data terverifikasi (Asumsi kunci penampung di verifikasi.html bernama 'dataKgbTerverifikasi')
            const dataKgb = JSON.parse(localStorage.getItem('dataKgbTerverifikasi')) || [];
            tabel.innerHTML = '';

            if (dataKgb.length === 0) {
                tabel.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-slate-400 italic">Belum ada data KGB yang diverifikasi.</td></tr>`;
                return;
            }

            dataKgb.slice().reverse().forEach((item, index) => {
                // Formatting mata uang Rupiah untuk Gaji Pokok
                const gajiFormatted = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(item.gajiBaru || 0);

                const row = `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800">${item.namaPegawai}</div>
                            <div class="text-[10px] text-slate-400 uppercase tracking-tighter">Golongan: ${item.golongan || '-'}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="font-mono text-xs text-slate-600">${item.nip}</div>
                            <div class="text-xs text-slate-500">${item.jabatan || '-'}</div>
                        </td>
                        <td class="px-6 py-4 font-semibold text-emerald-600">
                            ${gajiFormatted}
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2 text-xs font-medium text-slate-600">
                                <i data-lucide="calendar" class="w-3.5 h-3.5 text-slate-400"></i>
                                ${item.tmtKgb}
                            </div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase bg-green-100 text-green-700">
                                Siap Cetak
                            </span>
                        </td>
                        <td class="px-6 py-4 text-center no-print">
                            <div class="flex justify-center gap-2">
                                <button onclick="cetakSk(${item.id || index})" class="p-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-600 hover:text-white transition" title="Cetak SK KGB">
                                    <i data-lucide="file-text" class="w-4 h-4"></i>
                                </button>
                                <button onclick="hapusKgb(${item.id || index})" class="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition" title="Hapus">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
                tabel.insertAdjacentHTML('beforeend', row);
            });
            lucide.createIcons();
        }

        // --- ACTIONS ---
        function cetakSk(id) {
            Swal.fire({
                title: 'Cetak SK KGB',
                text: 'Sistem akan mengalihkan Anda ke berkas cetakan SK resmi.',
                icon: 'info',
                showCancelButton: true,
                confirmButtonColor: '#4f46e5',
                confirmButtonText: 'Cetak Sekarang'
            }).with((result) => {
                if (result.isConfirmed) {
                    // Logika cetak atau redirect ke format SK spesifik bisa ditaruh di sini
                    alert("Membuka template SK untuk ID: " + id);
                }
            });
        }

        function hapusKgb(idOrIndex) {
            Swal.fire({
                title: 'Hapus dari Arsip?',
                text: "Data yang dihapus tidak akan muncul di daftar pengeluaran KGB.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Hapus!'
            }).then((result) => {
                if (result.isConfirmed) {
                    let dataKgb = JSON.parse(localStorage.getItem('dataKgbTerverifikasi')) || [];
                    
                    // Filter berdasarkan ID unik atau index
                    dataKgb = dataKgb.filter((item, index) => (item.id ? item.id !== idOrIndex : index !== idOrIndex));
                    
                    localStorage.setItem('dataKgbTerverifikasi', JSON.stringify(dataKgb));
                    loadDataKgb();
                    Swal.fire('Terhapus!', 'Data berhasil dibuang dari log KGB.', 'success');
                }
            });
        }

        // --- EXPORT TO EXCEL ---
        function exportExcel() {
            const dataKgb = JSON.parse(localStorage.getItem('dataKgbTerverifikasi')) || [];
            if (dataKgb.length === 0) return alert("Tidak ada data untuk diekspor");

            // Membuat salinan data bersih untuk lembar Excel
            const cleanData = dataKgb.map(({ id, ...rest }) => rest);

            const ws = XLSX.utils.json_to_sheet(cleanData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data Keluar KGB");
            XLSX.writeFile(wb, "Arsip_KGB_Terverifikasi.xlsx");
        }
    </script>
</body>

</html>
