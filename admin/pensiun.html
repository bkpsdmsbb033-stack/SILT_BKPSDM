<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensiun Pegawai - SILT-BKPSDM</title>
    
    <!-- Resource Eksternal -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .print-area { width: 100%; border: none; }
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">

    <!-- NAVIGASI -->
    <nav class="bg-indigo-900 text-white shadow-md px-6 py-4 flex justify-between items-center no-print">
        <div class="flex items-center gap-3">
            <a href="admin.html" class="hover:bg-indigo-800 p-2 rounded-lg transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <h1 class="font-bold tracking-tight uppercase">Data Keluar Pensiun Pegawai</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right hidden sm:block">
                <p class="text-[10px] text-indigo-300 font-bold uppercase tracking-widest leading-none">Petugas</p>
                <p class="text-sm font-semibold" id="user-display">Administrator</p>
            </div>
            <div class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center border-2 border-indigo-400">
                <i data-lucide="user" class="w-5 h-5"></i>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        
        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 no-print">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Manajemen Pemberhentian & Pensiun</h1>
                <p class="text-slate-500 text-sm">Daftar aparatur/pegawai yang usulan pemberhentian atau pensiunnya telah divalidasi dan disetujui.</p>
            </div>
        </div>

        <!-- TABLE SECTION -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden print-area">
            <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center bg-slate-50/50 gap-4">
                <h2 class="font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="log-out" class="text-indigo-600 w-5 h-5"></i> Arsip Keluar Pensiun
                </h2>
                <div class="flex items-center gap-2 no-print">
                    <button onclick="exportExcel()" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-700 transition">
                        <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> EXCEL
                    </button>
                    <button onclick="window.print()" class="flex items-center gap-2 px-4 py-2 bg-slate-700 text-white text-xs font-bold rounded-lg hover:bg-slate-800 transition">
                        <i data-lucide="printer" class="w-4 h-4"></i> CETAK DAFTAR
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-slate-600 uppercase text-[10px] font-bold tracking-wider border-b">
                        <tr>
                            <th class="px-6 py-4">Pegawai</th>
                            <th class="px-6 py-4">NIP / Jabatan</th>
                            <th class="px-6 py-4">Jenis Pensiun</th>
                            <th class="px-6 py-4">TMT Pensiun</th>
                            <th class="px-6 py-4 text-center">Status</th>
                            <th class="px-6 py-4 text-center no-print">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelPensiun" class="text-sm text-slate-700 divide-y divide-slate-100">
                        <!-- Data dimuat via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            loadDataPensiun();
            lucide.createIcons();
            
            const user = localStorage.getItem('userName');
            if (user) document.getElementById('user-display').innerText = user;
        });

        // --- LOAD DATA FROM VERIFIKASI ---
        function loadDataPensiun() {
            const tabel = document.getElementById('tabelPensiun');
            
            // Mengambil data terverifikasi (Kunci penampung: 'dataPensiunTerverifikasi')
            const dataPensiun = JSON.parse(localStorage.getItem('dataPensiunTerverifikasi')) || [];
            tabel.innerHTML = '';

            if (dataPensiun.length === 0) {
                tabel.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-slate-400 italic">Belum ada data Pensiun yang diverifikasi.</td></tr>`;
                return;
            }

            dataPensiun.slice().reverse().forEach((item, index) => {
                const row = `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800">${item.namaPegawai}</div>
                            <div class="text-[10px] text-slate-400 uppercase tracking-tighter">Golongan Akhir: ${item.golongan || '-'}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="font-mono text-xs text-slate-600">${item.nip}</div>
                            <div class="text-xs text-slate-500">${item.jabatan || '-'}</div>
                        </td>
                        <td class="px-6 py-4 font-medium text-slate-700">
                            ${item.jenisPensiun || 'BUP (Batas Usia Pensiun)'}
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2 text-xs font-semibold text-rose-600 bg-rose-50 px-2.5 py-1 rounded-lg w-max">
                                <i data-lucide="calendar-days" class="w-3.5 h-3.5"></i>
                                ${item.tmtPensiun}
                            </div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase bg-amber-100 text-amber-800 border border-amber-200">
                                Berkas Final
                            </span>
                        </td>
                        <td class="px-6 py-4 text-center no-print">
                            <div class="flex justify-center gap-2">
                                <button onclick="cetakSkPensiun(${item.id || index})" class="p-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-600 hover:text-white transition" title="Cetak Dokumen Pensiun">
                                    <i data-lucide="file-check-2" class="w-4 h-4"></i>
                                </button>
                                <button onclick="hapusPensiun(${item.id || index})" class="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition" title="Hapus">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
                tabel.insertAdjacentHTML('beforeend', row);
            });
            lucide.createIcons();
        }

        // --- ACTIONS ---
        function cetakSkPensiun(id) {
            Swal.fire({
                title: 'Cetak Dokumen Pensiun',
                text: 'Sistem akan memproses berkas usulan pengantar pemberhentian/pensiun.',
                icon: 'info',
                showCancelButton: true,
                confirmButtonColor: '#4f46e5',
                confirmButtonText: 'Cetak Berkas'
            }).then((result) => {
                if (result.isConfirmed) {
                    alert("Membuka berkas cetakan pensiun untuk ID: " + id);
                }
            });
        }

        function hapusPensiun(idOrIndex) {
            Swal.fire({
                title: 'Hapus dari Arsip Pensiun?',
                text: "Data yang dihapus akan hilang dari log pengeluaran berkas pensiun.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Hapus!'
            }).then((result) => {
                if (result.isConfirmed) {
                    let dataPensiun = JSON.parse(localStorage.getItem('dataPensiunTerverifikasi')) || [];
                    
                    dataPensiun = dataPensiun.filter((item, index) => (item.id ? item.id !== idOrIndex : index !== idOrIndex));
                    
                    localStorage.setItem('dataPensiunTerverifikasi', JSON.stringify(dataPensiun));
                    loadDataPensiun();
                    Swal.fire('Terhapus!', 'Data berhasil dihapus dari log pensiun.', 'success');
                }
            });
        }

        // --- EXPORT TO EXCEL ---
        function exportExcel() {
            const dataPensiun = JSON.parse(localStorage.getItem('dataPensiunTerverifikasi')) || [];
            if (dataPensiun.length === 0) return alert("Tidak ada data untuk diekspor");

            const cleanData = dataPensiun.map(({ id, ...rest }) => rest);

            const ws = XLSX.utils.json_to_sheet(cleanData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Arsip Pensiun");
            XLSX.writeFile(wb, "Arsip_Pensiun_Terverifikasi.xlsx");
        }
    </script>
</body>

</html>
